<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#B8922A"/>
      <stop offset="45%" stop-color="#E2C06A"/>
      <stop offset="100%" stop-color="#B8922A"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#110406"/>
      <stop offset="100%" stop-color="#0A0203"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="6" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="5" fill="none" stroke="url(#gold)" stroke-width="0.5" stroke-opacity="0.35"/>

  <!-- D letterform -->
  <text
    x="11"
    y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="400"
    fill="url(#gold)"
    letter-spacing="-1"
  >D</text>

  <!-- Diagonal slash -->
  <line x1="33" y1="14" x2="27" y2="52" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- M letterform -->
  <text
    x="30"
    y="47"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="24"
    font-weight="400"
    fill="url(#gold)"
    letter-spacing="-1"
  >M</text>

  <!-- Bottom label -->
  <text
    x="32"
    y="59"
    font-family="Georgia, serif"
    font-size="5"
    font-weight="400"
    fill="url(#gold)"
    fill-opacity="0.5"
    text-anchor="middle"
    letter-spacing="2.5"
  >LAB</text>
</svg>
